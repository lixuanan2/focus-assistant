<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Focus Assistant Settings</title>
    <link rel="stylesheet" href="./index.css">
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <p class="eyebrow" data-i18n="appName">Focus Assistant</p>
        <h1 data-i18n="optionsHeading">Blocked websites</h1>
        <p class="description" data-i18n="optionsDescription">Manage domains with per-site switches and a stable scrolling list.</p>
      </section>

      <section class="card">
        <form id="settingsForm">
          <label class="field">
            <span data-i18n="focusModeLabel">Focus mode</span>
            <input id="enabledInput" type="checkbox">
          </label>

          <label class="field field-stack" for="blockedPageModeInput">
            <span data-i18n="blockedPageModeLabel">Blocked page target</span>
            <select id="blockedPageModeInput">
              <option value="internal" data-i18n="blockedPageModeInternal">Use built-in blocked page</option>
              <option value="external" data-i18n="blockedPageModeExternal">Redirect to custom URL</option>
            </select>
          </label>

          <label id="blockedPageUrlField" class="field field-stack" for="blockedPageUrlInput">
            <span data-i18n="blockedPageUrlLabel">Custom blocked page URL</span>
            <input id="blockedPageUrlInput" type="url" inputmode="url" spellcheck="false">
          </label>

          <section class="field field-stack">
            <div class="field-header">
              <span data-i18n="blockedDomainsLabel">Blocked domains</span>
              <span id="domainCount" class="field-meta">0 / 0</span>
            </div>
            <div class="domain-add">
              <input id="newDomainInput" type="text" inputmode="url" spellcheck="false">
              <button id="addDomainButton" class="button button-secondary" type="button" data-i18n="addDomainButton">Add domain</button>
            </div>
            <div class="domain-list-shell">
              <div class="domain-list-header" role="presentation">
                <span data-i18n="domainListEnabledColumn">Enabled</span>
                <span data-i18n="domainListDomainColumn">Domain</span>
                <span data-i18n="domainListActionColumn">Action</span>
              </div>
              <div id="domainList" class="domain-list" role="list"></div>
            </div>
          </section>

          <div class="actions">
            <button class="button" type="submit" data-i18n="saveSettingsButton">Save settings</button>
            <span id="feedback" class="feedback" aria-live="polite"></span>
          </div>
        </form>
      </section>
    </main>
    <script type="module" src="./index.js"></script>
  </body>
</html>
