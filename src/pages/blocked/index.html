<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Site Blocked</title>
    <link rel="icon" href="../../assets/icons/icon-32.png">
    <link rel="stylesheet" href="./index.css">
  </head>
  <body>
    <main class="page">
      <section class="card">
        <img class="brand-mark" src="../../assets/icons/icon-128.png" alt="Focus Assistant logo">
        <p class="eyebrow" data-i18n="appName">Focus Assistant</p>
        <h1 data-i18n="blockedPageHeading">This site is blocked</h1>
        <p class="description" data-i18n="blockedPageDescription">This website is blocked while focus mode is enabled.</p>

        <div class="target">
          <span data-i18n="blockedPageOriginalUrlLabel">Blocked URL</span>
          <code id="blockedUrl">-</code>
        </div>

        <div class="grid">
          <section class="panel">
            <span class="panel-label" data-i18n="blockedPageModeLabel">Active mode</span>
            <strong id="blockedSourceLabel">-</strong>
          </section>
          <section class="panel">
            <span class="panel-label" data-i18n="focusTaskLabel">Current focus task</span>
            <strong id="focusTaskText">-</strong>
          </section>
          <section class="panel panel-wide">
            <span class="panel-label" data-i18n="fallbackActionLabel">Smallest fallback action</span>
            <p id="fallbackActionText" class="panel-copy">-</p>
          </section>
        </div>

        <section class="bypass">
          <div class="bypass-header">
            <h2 data-i18n="blockedPageMinimalHeading">Keep it simple</h2>
            <p data-i18n="blockedPageMinimalDescription">Go back and continue, or use one short temporary bypass if you really need it.</p>
          </div>

          <div class="actions actions-primary">
            <button id="goBackButton" class="button" type="button" data-i18n="blockedPageReturnButton">Go back and continue</button>
            <button id="startBypassButton" class="button button-secondary" type="button">Temporary bypass</button>
            <button id="openOptionsButton" class="button button-muted" type="button" data-i18n="manageBlockedSitesButton">Manage blocked sites</button>
          </div>

          <p id="bypassStatus" class="inline-status"></p>
        </section>
      </section>
    </main>
    <script type="module" src="./index.js"></script>
  </body>
</html>
